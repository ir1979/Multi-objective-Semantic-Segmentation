mode: mgda
model: unet++
deep_supervision: true
pixel_loss: bce+iou
boundary_loss: hausdorff
shape_loss: convexity
pixel_weight: 1.0
boundary_weight: 1.0
shape_weight: 1.0
batch_size: 4
epochs: 100
lr: 0.0005
seed: 42
verbose: 2
output_dir: results
experiment_name: moss_experiment
rgb_glob: Datasets/RGB/*.png
mask_glob: Datasets/Mask/*.tif
train_split: 0.8
input_height: 256
input_width: 256
input_channels: 3
log_every: 50
resume: false
