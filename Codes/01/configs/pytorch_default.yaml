project:
  name: "building_segmentation_moo_pytorch"
  seed: 42
  deterministic: true

data:
  rgb_dir: "datasets/RGB"
  mask_dir: "datasets/Mask"
  image_size: 256
  batch_size: 4
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15
  num_workers: 0
  building_density_bins: 3

augmentation:
  enabled: true
  horizontal_flip: true
  vertical_flip: true
  random_rotation: true
  brightness_range: 0.1
  contrast_range: 0.1
  seed: 42

model:
  architecture: "unet"
  encoder_filters: [64, 128, 256, 512, 1024]
  dropout_rate: 0.3
  batch_norm: true
  deep_supervision: false

loss:
  strategy: "mgda"
  pixel:
    type: "bce_iou"
    weight: 1.0
    bce_iou_alpha: 0.5
  boundary:
    enabled: true
    weight: 0.3
  shape:
    enabled: true
    weight: 0.1

mgda:
  enabled: true
  solver: "frank_wolfe"
  max_iterations: 50
  tolerance: 1.0e-6
  normalize_gradients: true
  log_alphas: true

training:
  epochs: 10
  optimizer: "adam"
  learning_rate: 1.0e-4
  lr_scheduler:
    type: "cosine"
    warmup_epochs: 2
    min_lr: 1.0e-7
  early_stopping:
    enabled: true
    monitor: "val_iou"
    patience: 5
    mode: "max"
    min_delta: 1.0e-4

logging:
  console_level: "INFO"
  file_level: "DEBUG"
  tensorboard: true
  csv_logging: true
  validation_image_interval: 5

evaluation:
  metrics:
    - "iou"
    - "dice"
    - "precision"
    - "recall"
    - "f1"
    - "pixel_accuracy"

export:
  results_dir: "results"
