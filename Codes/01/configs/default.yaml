project:
  name: "building_segmentation_moo"
  seed: 42
  deterministic: true

data:
  rgb_dir: "datasets/RGB"
  mask_dir: "datasets/Mask"
  image_size: 256
  batch_size: 4
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15
  num_workers: 4
  prefetch_buffer: 2
  building_density_bins: 3

augmentation:
  enabled: true
  horizontal_flip: true
  vertical_flip: true
  random_rotation: true
  brightness_range: 0.1
  contrast_range: 0.1

model:
  architecture: "unet"
  encoder_filters: [64, 128, 256, 512, 1024]
  dropout_rate: 0.3
  batch_norm: true
  activation: "relu"
  output_activation: "sigmoid"
  deep_supervision: false

loss:
  strategy: "single"
  pixel:
    type: "bce"
    weight: 1.0
    bce_alpha: 0.5
  boundary:
    enabled: true
    type: "hausdorff_approx"
    weight: 0.3
    distance_threshold: 3
  shape:
    enabled: true
    type: "convexity"
    weight: 0.1
  deep_supervision:
    enabled: false
    weights: [0.5, 0.3, 0.2, 0.1]

mgda:
  enabled: false
  solver: "frank_wolfe"
  max_iterations: 50
  tolerance: 1.0e-6
  normalize_gradients: true
  log_alphas: true

training:
  epochs: 10
  optimizer: "adam"
  learning_rate: 1.0e-4
  lr_scheduler:
    type: "cosine"
    warmup_epochs: 2
    min_lr: 1.0e-7
  early_stopping:
    enabled: true
    monitor: "val_iou"
    patience: 5
    mode: "max"
    min_delta: 1.0e-4
  gradient_clip_norm: 1.0

checkpointing:
  save_every_n_epochs: 5
  save_best: true
  best_metric: "val_iou"
  save_optimizer: true
  save_mgda_state: true
  auto_resume: true

logging:
  console_level: "INFO"
  file_level: "DEBUG"
  tensorboard: true
  csv_logging: true
  log_gradient_norms: true
  log_mgda_alphas: true
  validation_image_interval: 5

evaluation:
  metrics:
    - "iou"
    - "dice"
    - "precision"
    - "recall"
    - "f1"
    - "pixel_accuracy"
  complexity_metrics:
    - "parameter_count"
    - "flops"
    - "inference_time_ms"
  test_time_augmentation: false

visualization:
  dpi: 300
  formats: ["pdf", "png"]
  font_family: "serif"
  font_size: 10
  figure_width_inches: 7.0
  colormap: "RdYlGn"
  prediction_grid_samples: 8
  boundary_overlay_samples: 6

export:
  results_dir: "results"
  latex_tables: true
  csv_tables: true
